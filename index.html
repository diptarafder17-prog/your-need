<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Link</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#312e81,#111827);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:520px;
    padding:45px;
    border-radius:28px;
    text-align:center;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.15);

    box-shadow:
        0 20px 60px rgba(0,0,0,.4),
        inset 0 0 20px rgba(255,255,255,.08);
}

.logo{
    width:95px;
    height:95px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#00e5ff,#4f46e5);
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:38px;
    box-shadow:0 0 35px rgba(0,229,255,.5);
}

h1{
    color:white;
    margin-top:22px;
    font-size:34px;
}

p{
    color:#d6d6d6;
    margin:15px 0 35px;
    line-height:1.7;
}

.btn{
    display:block;
    width:100%;
    margin:15px 0;
    padding:17px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:600;
    transition:.35s;
}

.primary{
    background:linear-gradient(135deg,#00d4ff,#3b82f6);
    box-shadow:0 0 25px rgba(0,212,255,.4);
}

.secondary{
    background:linear-gradient(135deg,#7c3aed,#ec4899);
    box-shadow:0 0 25px rgba(236,72,153,.35);
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);
    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.footer{
    margin-top:30px;
    color:#b8b8b8;
    font-size:14px;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:.45;
}

.c1{
    width:260px;
    height:260px;
    background:#00d4ff;
    top:-80px;
    left:-80px;
}

.c2{
    width:260px;
    height:260px;
    background:#ff00aa;
    bottom:-80px;
    right:-80px;
}
</style>
</head>
<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="card">

<div class="logo">🔗</div>

<h1>Premium Link Portal</h1>

<p>
Click one of the buttons below to continue.
</p>

<a href="https://www.xfree.com/tawhida?utm_source=xfree&utm_medium=feed&utm_campaign=copylink"
target="_blank"
class="btn primary">
🚀 Open XFree
</a>

<button
class="btn secondary"
onclick="window.location.href='https://www.google.com';">
🌐 Open Google
</button>

<div class="footer">
Designed with ❤️ • Glass UI • Responsive
</div>

</div>

</body>
</html>
